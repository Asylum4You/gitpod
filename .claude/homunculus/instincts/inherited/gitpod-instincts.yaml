# Gitpod Workflow Go Module Dependency Bump

## Action

Follow the go-module-dependency-bump workflow:
1. Identify outdated Go modules in each component/directory.
2. Update the version of dependencies in go.mod files.
3. Regenerate go.sum files to reflect the updated dependencies.
4. Repeat for each affected component/directory.
5. Commit all changed go.mod and go.sum files in a single commit.

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: */go.mod, */go.sum, */*/go.mod

